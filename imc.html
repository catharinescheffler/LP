<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de IMC</title>
</head>
<body>
    <h1>Cálculo de IMC</h1>
    <p id="resultado"></p>

    <script>
        // Declaração das variáveis
        var peso, altura, imc;

        // Entrada de dados
        peso = prompt("Informe o seu peso (em quilogramas):");
        altura = prompt("Informe a sua altura (em metros):");

        // Substituindo vírgula por ponto e convertendo para número
        peso = Number(peso.replace(",", "."));
        altura = Number(altura.replace(",", "."));

        // Cálculo do IMC
        imc = peso / (altura * altura);

        // Saída do resultado na página
        document.getElementById("resultado").innerHTML = "O seu IMC é: " + imc.toFixed(2);
    </script>
</body>
</html>
